---
# ── Rôle : app ───────────────────────────────────────────────

- name: Installer Python 3, pip et virtualenv
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
      - gcc
      - libmysqlclient-dev
      - pkg-config
    state: present

- name: Créer le répertoire de l'application
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Copier les fichiers de l'application
  copy:
    src: "{{ playbook_dir }}/../app/"
    dest: "{{ app_dir }}/"
    owner: www-data
    group: www-data
    mode: '0644'

- name: Créer l'environnement virtuel Python
  command:
    cmd: python3 -m venv {{ app_dir }}/venv
    creates: "{{ app_dir }}/venv"

- name: Installer les dépendances Python
  pip:
    requirements: "{{ app_dir }}/requirements.txt"
    virtualenv: "{{ app_dir }}/venv"
    state: present

- name: Copier le fichier de configuration de l'environnement
  template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    owner: www-data
    mode: '0640'

- name: Créer les fichiers de log avec les bonnes permissions
  file:
    path: "{{ item }}"
    state: touch
    owner: www-data
    group: www-data
    mode: '0644'
  loop:
    - /var/log/hopital-access.log
    - /var/log/hopital-error.log

- name: Créer le service systemd pour Gunicorn
  template:
    src: hopital.service.j2
    dest: /etc/systemd/system/hopital-yaounde.service
    mode: '0644'
  notify: Redémarrer le service Gunicorn

- name: Activer et démarrer le service Gunicorn
  systemd:
    name: hopital-yaounde
    state: started
    enabled: yes
    daemon_reload: yes
