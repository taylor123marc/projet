---
# ── Rôle : database ──────────────────────────────────────────

- name: Installer MySQL Server et les dépendances Python
  apt:
    name:
      - mysql-server
      - mysql-client
      - python3-mysqldb
      - libmysqlclient-dev
    state: present
    update_cache: yes

- name: Démarrer et activer MySQL au démarrage
  systemd:
    name: mysql
    state: started
    enabled: yes

- name: Définir le mot de passe root MySQL
  mysql_user:
    name: root
    host: localhost
    password: "{{ mysql_root_password }}"
    login_unix_socket: /var/run/mysqld/mysqld.sock
    state: present
  ignore_errors: yes

- name: Copier le fichier de configuration MySQL client (pour root)
  template:
    src: my.cnf.j2
    dest: /root/.my.cnf
    owner: root
    mode: '0600'

- name: Créer la base de données
  mysql_db:
    name: "{{ mysql_db }}"
    state: present
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci

- name: Créer l'utilisateur MySQL de l'application
  mysql_user:
    name: "{{ mysql_user }}"
    password: "{{ mysql_password }}"
    host: localhost
    priv: "{{ mysql_db }}.*:ALL"
    state: present

- name: Copier le schéma SQL sur le serveur
  copy:
    src: "{{ playbook_dir }}/../app/schema.sql"
    dest: /tmp/schema.sql

- name: Importer le schéma (tables et données initiales)
  mysql_db:
    name: "{{ mysql_db }}"
    state: import
    target: /tmp/schema.sql
  ignore_errors: yes
